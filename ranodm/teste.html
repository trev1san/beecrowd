<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário!</title>
    <style>
        /* Estilos gerais da página */
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease forwards 4s; /* Aparece depois que o bolo tá pronto */
        }

        p {
            font-size: 1.2rem;
            color: #bdc3c7;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeIn 1s ease forwards 4.5s;
        }

        /* Container do bolo */
        .cake-container {
            position: relative;
            width: 200px;
            height: 250px;
        }

        /* Peças do bolo */
        .plate {
            position: absolute;
            bottom: 0;
            left: -25px;
            width: 250px;
            height: 15px;
            background-color: #bdc3c7;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        .bottom-layer {
            position: absolute;
            bottom: 15px;
            width: 200px;
            height: 70px;
            background-color: #8e44ad; /* Sabor uva/amora */
            border-radius: 10px 10px 0 0;
        }

        .middle-layer {
            position: absolute;
            bottom: 85px;
            left: 20px;
            width: 160px;
            height: 60px;
            background-color: #e67e22; /* Sabor laranja/cenoura */
            border-radius: 10px 10px 0 0;
        }

        .top-layer {
            position: absolute;
            bottom: 145px;
            left: 40px;
            width: 120px;
            height: 50px;
            background-color: #f1c40f; /* Sabor baunilha */
            border-radius: 10px 10px 0 0;
        }

        .candle {
            position: absolute;
            bottom: 195px;
            left: 95px;
            width: 10px;
            height: 40px;
            background-color: #ecf0f1;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, #e74c3c 5px, #e74c3c 10px);
            border-radius: 3px;
        }

        .flame {
            position: absolute;
            bottom: 240px;
            left: 90px;
            width: 20px;
            height: 30px;
            background-color: #f39c12;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 20px #f1c40f;
        }

        /* --- Animações --- */
        
        /* Tudo começa invisível */
        .plate, .bottom-layer, .middle-layer, .top-layer, .candle {
            opacity: 0;
            transform: translateY(-50px);
            animation: dropIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .flame {
            opacity: 0;
            transform: scale(0);
        }

        /* Timing da montagem (Delays) */
        .plate { animation-delay: 0.5s; }
        .bottom-layer { animation-delay: 1.2s; }
        .middle-layer { animation-delay: 1.9s; }
        .top-layer { animation-delay: 2.6s; }
        .candle { animation-delay: 3.3s; }
        
        /* A chama acende e depois pisca */
        .flame { 
            animation: 
                ignite 0.5s ease forwards 3.8s, 
                flicker 0.1s infinite alternate 4.3s; 
        }

        /* Keyframes */
        @keyframes dropIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes ignite {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes flicker {
            from { transform: scale(1) rotate(-2deg); opacity: 0.9; }
            to { transform: scale(1.1) rotate(2deg); opacity: 1; box-shadow: 0 0 30px #e67e22; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="cake-container">
        <div class="plate"></div>
        <div class="bottom-layer"></div>
        <div class="middle-layer"></div>
        <div class="top-layer"></div>
        <div class="candle"></div>
        <div class="flame"></div>
    </div>

    <h1>FELIZ NIVER KYOSHI, PORRA 🎉</h1>
    <p>TMJ GATAO EU TE AMO DEMAIS</p>
</body>
</html>
